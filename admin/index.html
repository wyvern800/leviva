<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel de Leads - Marketing</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      /* estilos pequenos só para o painel; mantém o projeto sem framework */
      .admin-wrap {
        position: relative;
        z-index: 1;
        max-width: min(100%, 80rem);
        margin: 0 auto;
        padding: 1rem;
      }
      .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .admin-title {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text);
      }
      .admin-subtitle {
        margin: 0.25rem 0 0;
        color: var(--text-muted);
        font-size: 0.875rem;
      }
      .admin-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .admin-date-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .admin-date {
        padding: 0.45rem 0.5rem;
        border: 1px solid #d6d3d1;
        border-radius: var(--radius-sm);
        background: #fafaf9;
        font: inherit;
        font-size: 0.85rem;
        color: var(--text);
        max-width: 11rem;
      }
      .admin-date:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
        background: #fff;
      }
      .admin-search {
        width: min(24rem, 100%);
        padding: 0.6rem 0.75rem;
        border: 1px solid #d6d3d1;
        border-radius: var(--radius-sm);
        background: #fafaf9;
        font: inherit;
      }
      .admin-search:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
        background: #fff;
      }
      .admin-status {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 0.5rem 0 1rem;
      }
      .leads-list {
        width: 100%;
      }
      .admin-table-wrap {
        overflow-x: auto;
        border-radius: var(--radius);
        border: 1px solid #e7e5e4;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow);
      }
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      .admin-table thead {
        background: #f5f5f4;
        border-bottom: 1px solid #e7e5e4;
      }
      .admin-table th {
        text-align: left;
        padding: 0.65rem 0.85rem;
        font-weight: 700;
        color: #57534e;
        white-space: nowrap;
      }
      .admin-table td {
        padding: 0.65rem 0.85rem;
        border-bottom: 1px solid #f5f5f4;
        vertical-align: middle;
      }
      .admin-table tbody tr[data-lead-row]:hover {
        background: #fafaf9;
      }
      .admin-table .td-email {
        font-weight: 700;
        max-width: 14rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .admin-table .td-muted {
        color: var(--text-muted);
      }
      .admin-table .td-actions {
        white-space: nowrap;
      }
      .admin-table .badge-plan {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #f0fdfa;
        color: #0f766e;
        border: 1px solid rgba(15, 118, 110, 0.2);
      }
      .admin-table .wa-btn {
        display: inline-flex;
        align-items: center;
        padding: 0.3rem 0.6rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: #fff !important;
        background: #25d366;
        border-radius: var(--radius-sm);
        text-decoration: none;
        margin-right: 0.35rem;
      }
      .admin-table .wa-btn:hover:not(:disabled) {
        filter: brightness(1.06);
        color: #fff !important;
      }
      .admin-table .wa-btn.wa-btn--disabled,
      .admin-table .wa-btn:disabled {
        background: #d6d3d1 !important;
        color: #78716c !important;
        cursor: not-allowed;
        border: none;
        font: inherit;
        filter: none;
      }
      .admin-table .btn-json {
        border: 1px solid #d6d3d1;
        background: #fff;
        cursor: pointer;
        padding: 0.3rem 0.55rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 700;
        color: #57534e;
      }
      .admin-table .btn-json:hover {
        background: #fafaf9;
        border-color: #a8a29e;
      }
      .admin-json-row td {
        padding: 0;
        border-bottom: 1px solid #e7e5e4;
        background: #fafaf9;
      }
      .admin-json-row pre {
        margin: 0;
        padding: 0.85rem;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.8rem;
        color: var(--text);
        max-height: 20rem;
        overflow: auto;
      }
      .admin-table-empty {
        padding: 2rem 1rem;
        text-align: center;
        color: var(--text-muted);
      }
      .admin-token-panel {
        max-width: 24rem;
        padding: 1rem;
        background: #fafaf9;
        border: 1px solid #e7e5e4;
        border-radius: var(--radius-sm);
        margin-bottom: 1rem;
      }
      .admin-token-panel p {
        margin: 0 0 0.75rem;
        font-size: 0.875rem;
        color: var(--text-muted);
      }
      .admin-token-panel input {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="bg-wrap" aria-hidden="true">
      <div id="bg-triangles" class="bg-triangles"></div>
      <div class="bg-gradient"></div>
    </div>

    <main class="admin-wrap">
      <div id="admin-token-panel" class="admin-token-panel" hidden>
        <p>
          Informe o mesmo valor de <strong>LEADS_ADMIN_TOKEN</strong> da API (ou abra uma vez com
          <code>?token=SUA_CHAVE</code> na URL).
        </p>
        <label class="field__label" for="admin-token-input">Token</label>
        <input
          type="password"
          id="admin-token-input"
          class="field__input"
          placeholder="Cole o token"
          autocomplete="current-password"
        />
        <button type="button" class="btn btn--primary btn--block" id="admin-token-submit">Entrar</button>
      </div>

      <div class="admin-header">
        <div>
          <div class="admin-title">Painel de Leads (Marketing)</div>
          <p class="admin-subtitle">Visualização dinâmica para equipe. Somente leitura.</p>
        </div>
        <div class="admin-actions">
          <input id="admin-search" class="admin-search" placeholder="Buscar por e-mail, nome ou WhatsApp" />
          <label class="admin-date-wrap" for="admin-date-from">De</label>
          <input type="date" id="admin-date-from" class="admin-date" title="Data inicial (criação do lead)" />
          <label class="admin-date-wrap" for="admin-date-to">Até</label>
          <input type="date" id="admin-date-to" class="admin-date" title="Data final (criação do lead)" />
          <button type="button" class="btn btn--secondary" id="admin-date-clear" title="Limpar filtros de data">
            Limpar datas
          </button>
          <button class="btn btn--secondary" id="admin-refresh" type="button">Atualizar</button>
        </div>
      </div>

      <p class="admin-status" id="admin-status">Carregando...</p>

      <div class="leads-list" id="leads-list"></div>
    </main>

    <script>
      /** API Leviva — GET /api/v1/leads?token=... (mesmo valor que LEADS_ADMIN_TOKEN na API) */
      //window.LEVIVA_API_URL = "http://localhost:3001";
      window.LEVIVA_API_URL = "https://api.levivaapp.com";
    </script>
    <script src="../admin.js" defer></script>
  </body>
</html>
